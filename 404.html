<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.5rem;
      font-family: 'DM Sans', sans-serif;
    }

    .brand {
      font-size: 13px;
      color: #444;
      letter-spacing: 0.04em;
      font-weight: 400;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 1rem 0;
    }

    .num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: min(38vw, 220px);
      line-height: 0.85;
      color: #1c1c1c;
      letter-spacing: -2px;
      user-select: none;
      width: 100%;
      text-align: center;
    }

    .heading {
      font-size: clamp(15px, 4vw, 26px);
      font-weight: 500;
      color: #e8e8e8;
      margin: clamp(1rem, 3vw, 1.8rem) 1rem 0.6rem;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .sub {
      font-size: clamp(12px, 3vw, 13px);
      color: #555;
      line-height: 1.7;
      max-width: 300px;
      font-weight: 300;
      padding: 0 1rem;
    }

    .sub a {
      color: #888;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 1rem;
      border-top: 0.5px solid #1a1a1a;
    }

    .footer-links,
    .footer-right {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-links a,
    .footer-right a {
      font-size: 11px;
      color: #3a3a3a;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover,
    .footer-right a:hover {
      color: #666;
    }

    @media (max-width: 400px) {
      .footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .footer-links,
      .footer-right {
        gap: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="brand">Devanshu Dhyanu</div>

  <div class="center">
    <p class="num">404</p>
    <h1 class="heading">Oops, the page was not found...</h1>
    <p class="sub">
      It looks like the page you tried to find doesn't exist or isn't named like that.
      Try again or return to the <a href="/">homepage</a>.
    </p>
  </div>

  <div class="footer">
    <div class="footer-links">
      <a href="https://instagram.com/YOUR_USERNAME" target="_blank">Instagram</a>
      <a href="https://linkedin.com/in/YOUR_USERNAME" target="_blank">LinkedIn</a>
      <a href="https://github.com/YOUR_USERNAME" target="_blank">GitHub</a>
    </div>
    <div class="footer-right">
      <a href="/privacy">Privacy Policy</a>
      <a href="/legal">Legal Info</a>
    </div>
  </div>

</body>

</html>
